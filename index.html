<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Knave Developer Portfolio">

<title>Knave | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- FLOATING DECORATIONS -->

<div class="decor decor-1">🍖</div>
<div class="decor decor-2">⚓</div>
<div class="decor decor-3">💰</div>
<div class="decor decor-4">⭐</div>



<!-- NAVBAR -->

<nav>

<div class="nav-left">

<div class="logo">
Knave
</div>

<div class="nav-icons">

<button id="soundToggle">
<i class="fas fa-volume-up"></i>
</button>

</div>

</div>


<ul>

<li><a href="#hero">Home</a></li>

<li><a href="#about">About</a></li>

<li><a href="#projects">Projects</a></li>

<li><a href="#contact">Contact</a></li>

</ul>

</nav>



<!-- HERO SECTION -->

<section id="hero" class="hero">

<div class="hero-content">

<!-- APK DOWNLOAD BUTTON -->

<a href="Otakucloud_v1.0.apk"
download
class="hero-badge">

KNAVE

</a>


<h1>

I'm Gonna Be The King Of The Pirates!

</h1>


<div class="hero-img-container">

<img src="luffy.jpeg" alt="Knave">

</div>


<a href="#projects" class="comic-btn">

View My Projects

</a>


</div>


<div class="scroll-indicator">

<i class="fas fa-arrow-down"></i>

</div>


</section>



<!-- ABOUT -->

<section id="about">

<div class="section-container text-center">

<h2 class="section-title">

Character Lore

</h2>


<div class="comic-box about-bubble">

Yo ho ho !!

</div>

</div>

</section>



<!-- PROJECTS -->

<section id="projects">

<div class="section-container text-center">

<h2 class="section-title">

Projects

</h2>


<div class="projects-grid" id="projectsGrid">

<h3 style="grid-column:1/-1;">

Loading projects...

</h3>

</div>

</div>

</section>



<!-- CONTACT -->

<section id="contact">

<div class="section-container text-center">

<h2 class="section-title">

Contact

</h2>


<form
class="comic-box contact-form"
action="https://formspree.io/f/xdawdbke"
method="POST">

<input type="hidden" name="_replyto">


<div class="input-group">

<label>Name</label>

<input
type="text"
name="name"
placeholder="Your Name"
required>

</div>


<div class="input-group">

<label>Email</label>

<input
type="email"
name="email"
placeholder="your@email.com"
required>

</div>


<div class="input-group">

<label>Message</label>

<textarea
name="message"
rows="4"
placeholder="Write your message here..."
required></textarea>

</div>


<button
type="submit"
class="comic-btn"
style="width:100%;">

Send Message

</button>


</form>

</div>

</section>



<!-- CHATBOT -->

<div id="knave-chat-wrapper">

<div id="knave-chat-window">


<div id="knave-chat-header">

<span>

<i class="fas fa-robot"></i>

Knave Assistant

</span>


<span
onclick="toggleKnaveChat()"
style="cursor:pointer;font-size:1.5rem;">

×

</span>

</div>



<div id="knave-chat-messages"></div>



<div id="knave-chat-input-area">

<input
type="text"
id="knave-chat-input"
placeholder="Ask something...">

<button id="knave-send-btn">

<i class="fas fa-paper-plane"></i>

</button>

</div>

</div>



<div
id="knave-chat-toggle"
onclick="toggleKnaveChat()">

<i class="fas fa-comment-dots"></i>

</div>

</div>



<!-- MUSIC -->

<audio id="bgMusic" loop>

<source
src="onepiece.webm"
type="audio/webm">

</audio>



<!-- SCRIPT -->

<script src="script.js"></script>


</body>

</html>
