<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knave | King of the Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #6366f1;
      --accent: #ffd700;
      --bg-light: #f8fafc;
      --text-light: #1e293b;
      --bg-dark: #0f172a;
      --card-dark: #1e293b;
      --text-dark: #f1f5f9;
      --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-light);
      color: var(--text-light);
      overflow-x: hidden;
      transition: var(--transition);
      line-height: 1.6;
    }

    body.dark-mode {
      background-color: var(--bg-dark);
      color: var(--text-dark);
    }

    /* --- NAVIGATION --- */
    nav {
      position: fixed;
      top: 0; width: 100%;
      padding: 1.5rem 10%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.1);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    nav ul { display: flex; gap: 30px; list-style: none; }
    nav ul a {
      text-decoration: none;
      color: inherit;
      font-weight: 500;
      font-size: 0.9rem;
      text-transform: uppercase;
      transition: var(--transition);
    }
    nav ul a:hover { color: var(--primary); }

    /* --- HERO SECTION --- */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
      background: radial-gradient(circle at center, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
    }

    .hero-img-container {
      position: relative;
      margin-bottom: 2rem;
    }

    .hero img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      border: 4px solid var(--accent);
      animation: morphing 10s infinite alternate;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    @keyframes morphing {
      0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
      100% { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; }
    }

    .hero h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3rem, 8vw, 5rem);
      margin-bottom: 1rem;
      background: linear-gradient(90deg, var(--primary), #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .bounty-tag {
      background: var(--accent);
      color: #000;
      padding: 5px 15px;
      font-weight: 800;
      border-radius: 5px;
      margin-bottom: 1rem;
      transform: rotate(-2deg);
      display: inline-block;
    }

    /* --- PROJECTS GRID --- */
    .section-title {
      text-align: center;
      margin-bottom: 3rem;
      font-size: 2.5rem;
    }

    .projects { padding: 100px 10%; }
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 25px;
    }

    .project-card {
      background: white;
      padding: 2rem;
      border-radius: 20px;
      border: 1px solid rgba(0,0,0,0.05);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    body.dark-mode .project-card {
      background: var(--card-dark);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .project-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .project-card h3 { color: var(--primary); margin-bottom: 1rem; }
    
    .btn-github {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 8px 20px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    /* --- CHAT OVERHAUL --- */
    #knave-chat-toggle {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 65px;
      height: 65px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
      z-index: 1001;
      transition: var(--transition);
    }

    #knave-chat-window {
      position: fixed;
      bottom: 110px;
      right: 30px;
      width: 380px;
      height: 550px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      display: none;
      flex-direction: column;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      z-index: 1001;
      border: 1px solid rgba(255,255,255,0.2);
      overflow: hidden;
    }

    body.dark-mode #knave-chat-window {
      background: rgba(30, 41, 59, 0.95);
    }

    #knave-chat-header {
      background: var(--primary);
      padding: 20px;
      color: white;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
    }

    /* Responsive */
    @media (max-width: 768px) {
      nav ul { display: none; }
      #knave-chat-window { width: 90%; right: 5%; bottom: 100px; }
    }
  </style>
</head>

<body class="dark-mode">

  <nav>
    <div class="logo">Knave.dev</div>
    <ul>
      <li><a href="#hero">Home</a></li>
      <li><a href="#projects">Logbook</a></li>
      <li><a href="#contact">Transponder Snail</a></li>
    </ul>
    <button class="dark-mode-toggle" id="darkModeToggle" style="background:none; border:none; color:inherit; cursor:pointer; font-size:1.2rem;">
      <i class="fas fa-sun"></i>
    </button>
  </nav>

  <section id="hero" class="hero">
    <div class="hero-img-container">
      <img src="https://static.beebom.com/wp-content/uploads/2025/01/Luffys-Hito-Hito-no-Mi-Model-Nika.jpg?w=1024" alt="Gear 5">
    </div>
    <div class="bounty-tag">WANTED: DEAD OR ALIVE</div>
    <h1>Monkey D. Knave</h1>
    <p style="font-size: 1.2rem; opacity: 0.8; max-width: 600px;">
      Full-stack developer sailing across the digital ocean. Building world-class experiences with the Will of D.
    </p>
    
    <div class="social-links" style="margin-top: 2rem; display: flex; gap: 20px;">
        <a href="#" style="color: inherit; font-size: 1.5rem;"><i class="fab fa-github"></i></a>
        <a href="#" style="color: inherit; font-size: 1.5rem;"><i class="fab fa-instagram"></i></a>
        <a href="#" style="color: inherit; font-size: 1.5rem;"><i class="fab fa-linkedin"></i></a>
    </div>
  </section>

  <section id="projects" class="projects">
    <h2 class="section-title">Treasures Discovered</h2>
    <div class="projects-grid" id="projectsGrid">
      </div>
  </section>

  <div id="knave-chat-toggle"><i class="fas fa-comment-dots"></i></div>
  <div id="knave-chat-window">
    <div id="knave-chat-header">
      <span>🏴‍☠️ Grand Line Navigator</span>
      <span style="cursor:pointer" id="close-chat">×</span>
    </div>
    <div id="knave-chat-messages" style="flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;"></div>
    <div style="padding:20px; display:flex; gap:10px; border-top:1px solid rgba(255,255,255,0.1)">
      <input type="text" id="chat-input" placeholder="Ask the Navigator..." style="flex:1; padding:10px; border-radius:10px; border:none; outline:none;">
      <button id="send-btn" style="background:var(--primary); color:white; border:none; padding:10px 15px; border-radius:10px; cursor:pointer;">Send</button>
    </div>
  </div>

  <script>
    // Theme Toggle Logic
    const themeBtn = document.getElementById('darkModeToggle');
    themeBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      const icon = themeBtn.querySelector('i');
      icon.classList.toggle('fa-moon');
      icon.classList.toggle('fa-sun');
    });

    // Github Dynamic Fetch with Better UI
    async function fetchRepos() {
      const grid = document.getElementById('projectsGrid');
      try {
        const response = await fetch('https://api.github.com/users/keisazen-creator/repos?sort=updated');
        const repos = await response.json();
        
        grid.innerHTML = repos.slice(0, 6).map(repo => `
          <div class="project-card">
            <div style="font-size: 0.7rem; color: var(--primary); font-weight: 700; text-transform: uppercase; margin-bottom: 0.5rem;">
              ${repo.language || 'Adventure'}
            </div>
            <h3>${repo.name.replace(/-/g, ' ')}</h3>
            <p style="font-size: 0.9rem; opacity: 0.7;">${repo.description || 'A mysterious project found on the Grand Line.'}</p>
            <a href="${repo.html_url}" target="_blank" class="btn-github">Inspect Code</a>
          </div>
        `).join('');
      } catch (err) {
        grid.innerHTML = "<p>Logbook is currently sealed by the World Government.</p>";
      }
    }
    fetchRepos();

    // Chat Logic
    const chatToggle = document.getElementById('knave-chat-toggle');
    const chatWindow = document.getElementById('knave-chat-window');
    const closeChat = document.getElementById('close-chat');

    chatToggle.onclick = () => chatWindow.style.display = 'flex';
    closeChat.onclick = () => chatWindow.style.display = 'none';

    // (Add your existing OpenAI / Wikipedia logic here inside a simplified handleSend function)
  </script>
</body>
</html>
