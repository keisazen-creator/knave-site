<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knave | Pirate Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{

background:
radial-gradient(circle at top,#0b1d2a,#050b12),
url("https://www.transparenttextures.com/patterns/old-map.png");

color:#f2e9d8;
overflow-x:hidden;

}

/* ---------------- NAV ---------------- */

nav{

position:fixed;
top:0;
width:100%;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;

background:rgba(5,10,18,.85);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,.05);

}

.logo{

font-family:"Pirata One";
font-size:30px;
color:#ffd369;

}

nav a{

color:#eee;
text-decoration:none;
margin-left:25px;
font-weight:500;
transition:.3s;

}

nav a:hover{

color:#ffd369;

}

/* ---------------- HERO ---------------- */

.hero{

height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding-top:100px;

}

.hero h1{

font-family:"Pirata One";
font-size:70px;
color:#ffd369;
letter-spacing:3px;

}

.hero p{

margin-top:15px;
opacity:.8;

}

/* ---------------- WAVE ANIMATION ---------------- */

.waves{

position:fixed;
bottom:0;
left:0;
width:100%;
height:200px;
overflow:hidden;

}

.wave{

position:absolute;
width:200%;
height:200px;

background:rgba(8,27,44,.7);

border-radius:40%;

animation:wave 12s linear infinite;

}

.wave:nth-child(2){

animation-duration:18s;
opacity:.5;

}

@keyframes wave{

0%{transform:translateX(0)}
100%{transform:translateX(-50%)}

}

/* ---------------- CHAT BUTTON ---------------- */

#chat-toggle{

position:fixed;
bottom:25px;
right:25px;

background:#ffd369;
color:#111;

width:60px;
height:60px;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:26px;
cursor:pointer;

box-shadow:0 0 20px rgba(255,211,105,.6);

}

/* ---------------- CHAT WINDOW ---------------- */

#chat{

position:fixed;
bottom:100px;
right:25px;

width:350px;
height:480px;

background:#0c1824;
border-radius:14px;

display:none;
flex-direction:column;

box-shadow:0 0 25px rgba(0,0,0,.7);

}

#chat-header{

background:#13293d;
padding:12px;
font-weight:600;

}

#messages{

flex:1;
padding:12px;
overflow:auto;

}

.msg{

padding:8px 12px;
margin:8px 0;
border-radius:10px;
max-width:80%;

}

.user{

background:#ffd369;
color:#000;
margin-left:auto;

}

.bot{

background:#20384f;

}

#input{

display:flex;
border-top:1px solid rgba(255,255,255,.1);

}

#input input{

flex:1;
padding:10px;
background:#09141f;
border:none;
color:white;

}

#input button{

background:#ffd369;
border:none;
padding:10px 15px;
cursor:pointer;

}

/* ---------------- PROJECT GRID ---------------- */

.projects{

padding:100px 40px;

}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;

}

.card{

background:#0f2132;
padding:20px;
border-radius:10px;

border:1px solid rgba(255,255,255,.05);

transition:.3s;

}

.card:hover{

transform:translateY(-5px);
border-color:#ffd369;

}

</style>
</head>


<body>

<nav>

<div class="logo">Knave</div>

<div>
<a href="#">Home</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</div>

</nav>

<section class="hero">

<h1>Captain Knave</h1>
<p>Future King of the Pirates of Code</p>

</section>


<section id="projects" class="projects">

<h2>Treasure Chest (Projects)</h2>

<div class="grid" id="repos"></div>

</section>

<div class="waves">

<div class="wave"></div>
<div class="wave"></div>

</div>


<div id="chat-toggle">🏴‍☠️</div>

<div id="chat">

<div id="chat-header">
Navigator AI
</div>

<div id="messages"></div>

<div id="input">

<input id="chatInput" placeholder="Ask the navigator...">

<button onclick="send()">Send</button>

</div>

</div>



<script>

/* ---------------- CHAT TOGGLE ---------------- */

const toggle=document.getElementById("chat-toggle")
const chat=document.getElementById("chat")

toggle.onclick=()=>{

chat.style.display=
chat.style.display==="flex"?"none":"flex"

}


/* ---------------- MESSAGE ---------------- */

function add(text,type){

const div=document.createElement("div")

div.className="msg "+type

div.innerText=text

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

}


/* ---------------- ANTHROPIC API ---------------- */

const API_KEY="PASTE_YOUR_ANTHROPIC_KEY"

async function askClaude(question){

const res=await fetch(
"https://api.anthropic.com/v1/messages",
{
method:"POST",
headers:{
"x-api-key":API_KEY,
"anthropic-version":"2023-06-01",
"content-type":"application/json"
},

body:JSON.stringify({

model:"claude-3-haiku-20240307",

max_tokens:200,

messages:[
{
role:"user",
content:question
}
]

})

})

const data=await res.json()

return data.content[0].text

}


/* ---------------- SEND ---------------- */

async function send(){

const input=document.getElementById("chatInput")

const text=input.value

if(!text)return

add(text,"user")

input.value=""

const reply=await askClaude(text)

add(reply,"bot")

}


/* ---------------- GITHUB PROJECTS ---------------- */

async function loadRepos(){

const res=await fetch(
"https://api.github.com/users/keisazen-creator/repos"
)

const repos=await res.json()

const grid=document.getElementById("repos")

repos.slice(0,6).forEach(r=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<h3>${r.name}</h3>

<p>${r.description||"Hidden treasure"}</p>

<a href="${r.html_url}" target="_blank">
View
</a>

`

grid.appendChild(card)

})

}

loadRepos()

</script>

</body>
</html>
