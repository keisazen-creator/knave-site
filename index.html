<style>
  /* Scoped styles to prevent interference with your portfolio */
  #knave-chat-wrapper {
    position: fixed;
    bottom: 25px;
    right: 25px;
    z-index: 9999;
    font-family: 'Poppins', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  /* Glassmorphism Floating Button */
  #knave-chat-toggle {
    width: 60px;
    height: 60px;
    background: rgba(91, 92, 255, 0.8);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 26px;
    cursor: pointer;
    box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  #knave-chat-toggle:hover {
    transform: scale(1.1) rotate(15deg);
    background: #5b5cff;
  }

  /* Glassmorphism Chat Window */
  #knave-chat-window {
    width: 350px;
    height: 500px;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(15px) saturate(180%);
    -webkit-backdrop-filter: blur(15px) saturate(180%);
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    display: none; /* Controlled by JS */
    flex-direction: column;
    overflow: hidden;
    margin-bottom: 20px;
    animation: knaveSlideUp 0.4s ease-out;
  }

  @keyframes knaveSlideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #knave-chat-header {
    background: rgba(91, 92, 255, 0.9);
    color: white;
    padding: 15px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #knave-chat-messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Chat Bubbles */
  .knave-msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 15px;
    font-size: 14px;
    line-height: 1.4;
    animation: knaveFadeIn 0.3s ease;
  }

  @keyframes knaveFadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .knave-msg.user {
    align-self: flex-end;
    background: #5b5cff;
    color: white;
    border-bottom-right-radius: 2px;
  }

  .knave-msg.bot {
    align-self: flex-start;
    background: rgba(255, 255, 255, 0.9);
    color: #1a1a2e;
    border-bottom-left-radius: 2px;
    border: 1px solid rgba(0,0,0,0.05);
  }

  #knave-chat-input-area {
    padding: 15px;
    background: rgba(255, 255, 255, 0.5);
    display: flex;
    gap: 8px;
    border-top: 1px solid rgba(0,0,0,0.05);
  }

  #knave-chat-input {
    flex: 1;
    border: 1px solid rgba(0,0,0,0.1);
    background: white;
    padding: 8px 15px;
    border-radius: 20px;
    outline: none;
  }

  #knave-send-btn {
    background: #5b5cff;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: 600;
  }

  /* Custom Scrollbar */
  #knave-chat-messages::-webkit-scrollbar { width: 4px; }
  #knave-chat-messages::-webkit-scrollbar-thumb { background: rgba(91, 92, 255, 0.5); border-radius: 10px; }
</style>

<div id="knave-chat-wrapper">
  <div id="knave-chat-window">
    <div id="knave-chat-header">
      <span>🏴‍☠️ Knave's Navigator</span>
      <span style="cursor:pointer" onclick="toggleKnaveChat()">×</span>
    </div>
    <div id="knave-chat-messages"></div>
    <div id="knave-chat-input-area">
      <input type="text" id="knave-chat-input" placeholder="Ask me something, matey..." />
      <button id="knave-send-btn">Send</button>
    </div>
  </div>
  <div id="knave-chat-toggle" onclick="toggleKnaveChat()">💬</div>
</div>

<script>
  (function() {
    // --- CONFIGURATION ---
    const OPENAI_API_KEY = ""; // 🔑 Put your key here
    const BOT_NAME = "Navigator Bot";
    const OWNER_NAME = "Knave";

    const chatWindow = document.getElementById("knave-chat-window");
    const chatMessages = document.getElementById("knave-chat-messages");
    const chatInput = document.getElementById("knave-chat-input");
    const sendBtn = document.getElementById("knave-send-btn");

    window.toggleKnaveChat = function() {
      const isVisible = chatWindow.style.display === "flex";
      chatWindow.style.display = isVisible ? "none" : "flex";
      if (!isVisible && chatMessages.children.length === 0) {
        addMessage("Ahoy there! I'm the Navigator for Captain Knave's crew. What brings you to these waters?", "bot");
      }
    };

    function addMessage(text, side) {
      const div = document.createElement("div");
      div.className = `knave-msg ${side}`;
      div.innerText = text;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function fetchWikipedia(query) {
      try {
        const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
        const data = await res.json();
        return data.extract ? `Yo ho ho! My maps show this about that: ${data.extract}` : null;
      } catch (e) { return null; }
    }

    async function fetchOpenAI(query) {
      if (!OPENAI_API_KEY) return null;
      try {
        const res = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${OPENAI_API_KEY}`
          },
          body: JSON.stringify({
            model: "gpt-3.5-turbo",
            messages: [
              { role: "system", content: `You are a helpful, fun pirate assistant for ${OWNER_NAME}'s portfolio. Tone: One Piece anime style. Short responses.` },
              { role: "user", content: query }
            ]
          })
        });
        const data = await res.json();
        return data.choices[0].message.content;
      } catch (e) { return null; }
    }

    async function getBotResponse(userText) {
      // 1. OpenAI
      let response = await fetchOpenAI(userText);
      if (response) return response;

      // 2. Wikipedia
      response = await fetchWikipedia(userText);
      if (response) return response;

      // 3. Default Pirate Fallback
      const fallbacks = [
        "Shiver me timbers! That's a mystery even for the Grand Line!",
        "Ahoy! I haven't heard of that in these seven seas. Care to ask something else?",
        "Landlubber's logic! I can't find that in my logs, matey!"
      ];
      return fallbacks[Math.floor(Math.random() * fallbacks.length)];
    }

    async function handleSend() {
      const text = chatInput.value.trim();
      if (!text) return;

      addMessage(text, "user");
      chatInput.value = "";
      
      const botResponse = await getBotResponse(text);
      addMessage(botResponse, "bot");
    }

    sendBtn.onclick = handleSend;
    chatInput.onkeypress = (e) => { if (e.key === 'Enter') handleSend(); };
  })();
</script>
